branches: [main]
tagFormat: v${version}
plugins:
  - - "@semantic-release/commit-analyzer"
    - preset: conventionalcommits
      releaseRules:
        - { breaking: true, release: minor }
  - - "@semantic-release/release-notes-generator"
    - preset: conventionalcommits
  - "@semantic-release/changelog"
  - - "@semantic-release/exec"
    - prepareCmd: |
        printf "%s" "${nextRelease.version}" > VERSION
        tar \
          --exclude='./.git' \
          --exclude='./node_modules' \
          --exclude='*/node_modules' \
          --exclude='./.pi' \
          --exclude='./.opencode' \
          --transform "s,^\\.,towel-${nextRelease.version}," \
          -czf "towel-${nextRelease.version}.tar.gz" .
        sha256sum "towel-${nextRelease.version}.tar.gz" > "towel-${nextRelease.version}.tar.gz.sha256"
  - - "@semantic-release/git"
    - assets:
        - VERSION
        - CHANGELOG.md
      message: "chore(release): ${nextRelease.version} [skip ci]"
  - - "@semantic-release/github"
    - assets:
        - path: "towel-*.tar.gz"
          label: "Towel ${nextRelease.version} (source tarball)"
        - path: "towel-*.tar.gz.sha256"
          label: "sha256 checksum"
